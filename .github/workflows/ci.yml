name: 'Continuous Integration'

on:
  push:
    branches:
      - main
      - certification
      - develop
  pull_request:
    branches:
      - main
      - certification
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync --frozen
    
    - name: Run pipeline mlops
      run: |
        uv run src/mlops/pipeline.py

    - name: Run api tests
      run: uv run pytest -v tests/api_test.py --maxfail=1 --disable-warnings -q
